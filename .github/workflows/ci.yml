name: CI

on:
  push:
  pull_request:

jobs:
  # Fast feedback: cheapest runner, catches most compile/test failures early.
  linux-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          cache: true

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-x11-0

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # The real target: MSVC build, headless UI tests, distributable package.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: win64_msvc2019_64
          cache: true

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter xri_demo.exe | Select-Object -First 1
          if (-not $exe) { throw "xri_demo.exe not found under build/" }
          Write-Host "Packaging $($exe.FullName)"
          New-Item -ItemType Directory -Path deploy | Out-Null
          Copy-Item $exe.FullName deploy/
          windeployqt --release --no-translations --no-system-d3d-compiler deploy/xri_demo.exe
          Compress-Archive -Path deploy/* -DestinationPath xri_demo_win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xri-demo-windows
          path: xri_demo_win64.zip
